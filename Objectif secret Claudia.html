<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>VOUS AVEZ 1 NOUVEAU MESSAGE</title>
  <style>
    body {
      background-color: black;
      color: #ffad43;
      font-family: "Courier New", Courier, monospace;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container::-webkit-scrollbar-thumb {
  background: #ffad43;
  border-radius: 16px;
  box-shadow: 0 0 8px #ffad43;
}
    .container {
  border: 2px solid #ffad43;
  padding: 20px;
  width: 90%;
  max-width: 1100px;
  height: 650px; /* hauteur fixe */
  box-shadow: 0 0 20px #ffad43, inset 0 0 10px #ffad43;
  border-radius: 10px;
  text-align: left;
  overflow-y: auto; /* ajout d’une scrollbar si texte trop long */
}

    .blink {
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    #terminal {
      white-space: pre-wrap;
      font-size: 20px;
      line-height: 1.4em;
    }
    #start-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: black;
      border: 2px solid #ffad43;
      color: #ffad43;
      font-family: "Courier New", Courier, monospace;
      font-size: 22px;
      padding: 15px 30px;
      cursor: pointer;
      border-radius: 8px;
      text-shadow: 0 0 5px #ffad43;
    }
    #start-btn:hover {
      background: #003300;
    }
  </style>
</head>
<body>
  <!-- Bouton pour lancer l’expérience -->
  <button id="start-btn">OUVRIR LE MESSAGE</button>

  <!-- Conteneur terminal -->
  <div class="container">
    <div id="terminal"></div>
  </div>

  <script>
  const text = `
>> RECEPTION D'UN MESSAGE CONFIDENTIEL
>> PROTOTYPAGE DE L'INTERFACE 
>> INITIALISATION EN COURS...
>> VERIFICATION DES DROITS D'ACCES
>> . . .
>> . . .
>> ACCÈS AUTORISÉ
>> AUTHENTIFICATION DE L'EMETTEUR: EARTH GOV.
>> SUJET: OBJECTIF SECRET
>> . . .
>> TRANSCRIPTION DU MESSAGE
>> . . .
>> Agente infiltré Claudia Nicholls,
>> . . .
>> J'espère que votre rôle de superviseur d'une équipe de colons ne vous plaît pas trop. Parce que ça sera bientôt fini.
>> Vous êtes sous les radars depuis un moment et l'entreprise coloniale minière CEC ne semble pas avoir de doute quand à votre citoyenneté.
>> Déjà, bravo pour ça. Mais je me dois de vous rappeler pour qui vous travailler vraiment. EarthGov a besoin d'informations sur ces religieux d'Unitologistes.
>> Tu le sais peut-être déjà, mais CEC a trouvé un Marqueur sur ta planète. On pense que les comportements et la crise extérieur est dû à une manipulation du Marqueur par les Unitologistes.
>> . . .
>> Voilà ta nouvelle mission : récolte le plus d'informations possible sur les Unitologistes et leur lien avec le Marqueur, puis envoi ton rapport depuis l'Ishimura qui se trouve en orbite.
>> Fait gaffe... D'après nos sources, Junji Miura fait partie des Unitologistes. Alors surveille le de près.
>> Le grand chef pense qu'ils peuvent êtres utiles. Mais je pense qu'ils sont tous tarés.
>> . . .
>> Aller, à plus Claudia, et, bonne chance.
>> . . .
>> AUTO-DESTRUCTION DU MESSAGE EN COURS
>> . . .
>> FIN DE TRANSMISSION
`;

  const terminal = document.getElementById("terminal");
  const startBtn = document.getElementById("start-btn");

  let i = 0;

  function typeWriter() {
    if (i < text.length) {
      terminal.textContent += text.charAt(i);
      i++;

      // délai aléatoire plus court → entre 15ms et 80ms
      const delay = Math.floor(Math.random() * (60 - 15 + 1)) + 15;
      setTimeout(typeWriter, delay);

    } else {
      terminal.innerHTML += '<span class="blink">█</span>';
    }
  }

  startBtn.addEventListener("click", () => {
  startBtn.style.display = "none";
  typeWriter();
});
</script>

</body>
</html>
